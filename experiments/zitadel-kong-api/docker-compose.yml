name: kong-gateway

# ----------------------------------------------------------------------------
# Kong Gateway (DB-less) — stands on its own. It fronts backends that live in
# their OWN compose projects, reached over the shared external `edge` network.
#
#   kong-init -> fetches Zitadel's JWKS, renders kong.yml into a shared volume.
#   kong      -> DB-less; loads kong.yml; validates Bearer JWTs; proxies /api/*
#                to the `api` service on the `edge` network.
#
# The `edge` network must exist first (it's shared with the API stack):
#   docker network create edge
#
# Run with:  docker compose up --build
# ----------------------------------------------------------------------------

services:
  # 1. Bootstrap: pull Zitadel signing key -> render declarative Kong config.
  #    Uses the `zk` Go CLI (zk gen-config).
  kong-init:
    build: ./cli
    command: ["gen-config"]
    environment:
      # Value Kong matches against the token's `iss` claim (must match exactly).
      ZITADEL_ISSUER: ${ZITADEL_ISSUER:-http://localhost:8080}
      # How this container reaches Zitadel to download JWKS (host-published port).
      ZITADEL_INTERNAL_URL: ${ZITADEL_INTERNAL_URL:-http://host.docker.internal:8080}
      # Host header Zitadel's Traefik routes on (its rule is Host(`localhost`)).
      ZITADEL_HOST_HEADER: ${ZITADEL_HOST_HEADER:-localhost}
      # Upstream exposed to the template as {{ .Upstream }}. Resolves to the api
      # container on the shared `edge` network (DNS alias = service name).
      API_UPSTREAM: ${API_UPSTREAM:-http://api:8000}
      # Editable Kong config template (mounted below). Configure Kong by editing
      # config/kong.tmpl.yml — zk just injects the Zitadel signing key.
      KONG_TEMPLATE: /kong-template/kong.tmpl.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - kong-config:/kong-config
      # Mount ONLY the template — not the whole config/ dir — so the private
      # service-key.json is never exposed to the gateway container.
      - ./config/kong.tmpl.yml:/kong-template/kong.tmpl.yml:ro
    restart: "no"

  # 2. Kong Gateway — DB-less, declarative config from the shared volume.
  kong:
    image: kong:3.9
    depends_on:
      kong-init:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong-config/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - kong-config:/kong-config:ro
    ports:
      - "8000:8000"   # proxy  -> call your API here
      - "8001:8001"   # admin API (read-only inspection)
    networks:
      - edge
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  kong-config:

networks:
  # Shared with the API stack. Create once: docker network create edge
  edge:
    external: true
